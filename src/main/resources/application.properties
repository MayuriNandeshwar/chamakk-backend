# ===============================
# Application
# ===============================
spring.application.name=sunhom-backend

# ===============================
# Datasource (DB unchanged for now)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# ===============================
# JPA (STRICT MODE)
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Flyway (SINGLE SOURCE OF TRUTH)
# ===============================
logging.level.org.flywaydb=DEBUG
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# ===============================
# JWT Configuration
# ===============================
security.jwt.secret=${JWT_SECRET}
security.jwt.access-token-expiry=1800
security.jwt.issuer=${JWT_ISSUER}

# ===============================
# Jackson / Timezone
# ===============================
spring.jackson.time-zone=UTC

# ===============================
# Server
# ===============================
server.servlet.session.tracking-modes=cookie

# ======================================================
# CACHE + REDIS (BESTSELLER API)
# ======================================================
spring.cache.type=redis
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}

spring.cache.redis.time-to-live=1800000
spring.cache.redis.cache-null-values=false

# Disable TRACE in production (keep for dev only)
logging.level.org.springframework.cache=TRACE

# ===============================
# Scheduling (CRON JOBS)
# ===============================
spring.task.scheduling.pool.size=2

# ===============================
# CLOUDINARY
# ===============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}